apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: royalwheels
data:
  prometheus.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: royalwheels
data:
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: RoyalWheels
        orgId: 1
        folder: RoyalWheels
        type: file
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-royalwheels-dashboard
  namespace: royalwheels
data:
  royalwheels-overview.json: |
    {
      "title": "RoyalWheels Overview",
      "uid": "royalwheels-overview",
      "schemaVersion": 39,
      "refresh": "15s",
      "panels": [
        {"id":1,"type":"timeseries","title":"Request Rate by Method","gridPos":{"x":0,"y":0,"w":12,"h":8},"datasource":"Prometheus","targets":[{"expr":"sum(rate(django_http_requests_total_by_method_total[5m])) by (method)","legendFormat":"{{method}}"}]},
        {"id":2,"type":"timeseries","title":"Error Ratio","gridPos":{"x":12,"y":0,"w":12,"h":8},"datasource":"Prometheus","targets":[{"expr":"sum(rate(django_http_responses_total_by_status_total{status=~\"5..\"}[5m])) / clamp_min(sum(rate(django_http_responses_total_by_status_total[5m])), 1)","legendFormat":"5xx"},{"expr":"sum(rate(django_http_responses_total_by_status_total{status=~\"4..\"}[5m])) / clamp_min(sum(rate(django_http_responses_total_by_status_total[5m])), 1)","legendFormat":"4xx"}]},
        {"id":3,"type":"timeseries","title":"P95 Request Latency","gridPos":{"x":0,"y":8,"w":12,"h":8},"datasource":"Prometheus","targets":[{"expr":"histogram_quantile(0.95, sum(rate(django_http_requests_latency_seconds_by_view_method_bucket[5m])) by (le, view, method))","legendFormat":"p95 {{view}} {{method}}"}]},
        {"id":4,"type":"timeseries","title":"Database Query Rate","gridPos":{"x":12,"y":8,"w":12,"h":8},"datasource":"Prometheus","targets":[{"expr":"sum(rate(django_db_execute_total[5m]))","legendFormat":"queries/sec"}]},
        {"id":5,"type":"timeseries","title":"Service Availability","gridPos":{"x":0,"y":16,"w":24,"h":8},"datasource":"Prometheus","targets":[{"expr":"up{job=\"royalwheels\"}","legendFormat":"{{instance}}"}]}
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: royalwheels
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.2.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-admin
                  key: password
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboards
          configMap:
            name: grafana-royalwheels-dashboard
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: royalwheels
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
