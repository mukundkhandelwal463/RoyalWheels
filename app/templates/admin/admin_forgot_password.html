<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Forgot Password | RoyalWheels</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/admin/admin_login.css' %}">
  <link rel="stylesheet" href="{% static 'css/navbar.css' %}">
</head>
<body>
  <nav class="navbar">
    <section class="hero-image">
      <a href="/Home_index.html" style="text-decoration: none; color: inherit;">
        <img src="{% static 'assets/logo.jpg' %}" alt="RoyalWheels logo" />
      </a>
    </section>

    <div class="logo">
      <span class="logo-royal">Royal</span><span class="logo-wheels">Wheels</span>
    </div>

    <ul class="nav-links">
      <li><a href="/Home_index.html" style="text-decoration: none; color: inherit;">Home</a></li>
      <li><a href="/Bikes.html" style="text-decoration: none; color: inherit;">Bikes</a></li>
      <li><a href="/Car.html" style="text-decoration: none; color: inherit;">Cars</a></li>
      <li><a href="/MyBooking.html" style="text-decoration: none; color: inherit;">My Bookings</a></li>
    </ul>

    <div class="nav-actions">
      <button class="btn-outline" onclick="window.location.href='/admin-login/'">Admin</button>
      <button class="btn-primary" onclick="window.location.href='/login.html'">Login</button>
    </div>
  </nav>

  <main class="login-shell">
    <section class="auth-container">
      <h2>Admin Reset Password</h2>

      {% if messages %}
        {% for message in messages %}
          <p class="auth-message">{{ message }}</p>
        {% endfor %}
      {% endif %}

      <form method="post" action="{% url 'admin_forgot_password_page' %}">
        {% csrf_token %}
        <input type="email" name="email" id="adminForgotEmail" placeholder="Registered Email" required>
        <div class="otp-row">
          <input type="text" id="adminForgotEmailOtp" placeholder="Email OTP">
          <button type="button" id="sendAdminForgotEmailOtp" class="otp-btn">Send Email OTP</button>
          <button type="button" id="verifyAdminForgotEmailOtp" class="otp-btn">Verify</button>
        </div>
        <input type="tel" name="phone" id="adminForgotPhone" placeholder="+91XXXXXXXXXX" value="+91" required>
        <input type="password" name="password" placeholder="New Password" required>
        <input type="password" name="confirm_password" placeholder="Confirm New Password" required>
        <button type="submit">Update Password</button>
      </form>

      <p class="auth-meta"><a href="{% url 'admin_login_page' %}">Back to admin login</a></p>
    </section>
  </main>
  <script src="{% static 'js/admin/admin_otp.js' %}"></script>
</body>
</html>
