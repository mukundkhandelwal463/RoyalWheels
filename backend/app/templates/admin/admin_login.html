<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | RoyalWheels</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/admin/admin_login.css' %}">
  <link rel="stylesheet" href="{% static 'css/navbar.css' %}">
</head>
<body>
  <nav class="navbar">
    <section class="hero-image">
      <a href="/Home_index.html" style="text-decoration: none; color: inherit;">
        <img src="{% static 'assets/logo.jpg' %}" alt="RoyalWheels logo" />
      </a>
    </section>

    <div class="logo">
      <span class="logo-royal">Royal</span><span class="logo-wheels">Wheels</span>
    </div>

    <ul class="nav-links">
      <li><a href="/Home_index.html" style="text-decoration: none; color: inherit;">Home</a></li>
      <li><a href="/Bikes.html" style="text-decoration: none; color: inherit;">Bikes</a></li>
      <li><a href="/Car.html" style="text-decoration: none; color: inherit;">Cars</a></li>
      <li><a href="/MyBooking.html" style="text-decoration: none; color: inherit;">My Bookings</a></li>
    </ul>

    <div class="nav-actions">
      <div class="search-wrapper">
        <input type="text" placeholder="Search vehicles" />
        <span class="search-icon" aria-hidden="true">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </span>
      </div>

      <button class="btn-outline" onclick="window.location.href='/admin-login/'">Admin</button>
      <button class="btn-primary" onclick="window.location.href='/login.html'">Login</button>
    </div>
  </nav>

  <main class="login-shell">
    <section class="auth-container">
      <h2>Admin Login</h2>

      {% if messages %}
        {% for message in messages %}
          <p class="auth-message">{{ message }}</p>
        {% endfor %}
      {% endif %}

      <form method="post" action="{% url 'admin_login_page' %}">
        {% csrf_token %}
        <input type="text" name="username" id="loginEmail" placeholder="Username or Email" required>
        <input type="password" name="password" id="loginPassword" placeholder="Password" required>
        <button type="submit">Login</button>
      </form>

      <p class="auth-meta"><a href="{% url 'admin_forgot_password_page' %}">Forgot Password?</a></p>
      <p class="switch">New user? <a href="{% url 'admin_signup_page' %}">Create an account</a></p>
    </section>
  </main>
  <script>
    const activeRole = localStorage.getItem("activeRole");
    if (activeRole === "customer") {
      alert("User is currently logged in. Logout user first.");
      window.location.href = "/profile.html";
    } else if (activeRole === "admin") {
      // Stale lock cleanup if admin session already ended.
      localStorage.removeItem("activeRole");
    }
  </script>
</body>
</html>
