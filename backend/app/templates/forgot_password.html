<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password | RoyalWheels</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/auth.css' %}">
  <link rel="stylesheet" href="{% static 'css/navbar.css' %}">
</head>
<body class="login-page">
<nav class="navbar">
  <section class="hero-image">
    <a href="/Home_index.html" style="text-decoration: none; color: inherit;">
      <img src="{% static 'assets/logo.jpg' %}" alt="RoyalWheels logo" />
    </a>
  </section>

  <div class="logo">
    <span class="logo-royal">Royal</span><span class="logo-wheels">Wheels</span>
  </div>

  <ul class="nav-links">
    <li><a href="/Home_index.html" style="text-decoration: none; color: inherit;">Home</a></li>
    <li><a href="/Bikes.html" style="text-decoration: none; color: inherit;">Bikes</a></li>
    <li><a href="/Car.html" style="text-decoration: none; color: inherit;">Cars</a></li>
    <li><a href="/MyBooking.html" style="text-decoration: none; color: inherit;">My Bookings</a></li>
  </ul>

  <div class="nav-actions">
    <button class="btn-outline" onclick="window.location.href='/admin-login/'">Admin</button>
    <button class="btn-primary" onclick="window.location.href='/login.html'">Login</button>
  </div>
</nav>

<main class="login-shell">
  <div class="auth-container">
    <h2>Reset Password</h2>

    <form id="forgotPasswordForm" onsubmit="event.preventDefault(); resetCustomerPassword();">
      <input type="email" id="resetEmail" placeholder="Email" required>
      <div class="otp-row">
        <input type="text" id="resetEmailOtp" placeholder="Email OTP">
        <button type="button" id="sendResetEmailOtpBtn" class="otp-btn">Send Email OTP</button>
        <button type="button" id="verifyResetEmailOtpBtn" class="otp-btn">Verify</button>
      </div>
      <input type="password" id="resetPassword" placeholder="New Password" required minlength="6">
      <input type="password" id="resetConfirmPassword" placeholder="Confirm New Password" required minlength="6">
      <button type="submit">Update Password</button>
    </form>

    <p class="auth-meta"><a href="/login.html">Back to login</a></p>
  </div>
</main>

<script src="{% static 'js/auth.js' %}?v=20260307a"></script>
</body>
</html>
