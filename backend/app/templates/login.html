<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer Login | RoyalWheels</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/auth.css' %}">
  <link rel="stylesheet" href="{% static 'css/navbar.css' %}">
</head>
<body class="login-page">
<nav class="navbar">
  <section class="hero-image">
    <a href="/Home_index.html" style="text-decoration: none; color: inherit;">
      <img src="{% static 'assets/logo.jpg' %}" alt="RoyalWheels logo" />
    </a>
  </section>

  <div class="logo">
    <span class="logo-royal">Royal</span><span class="logo-wheels">Wheels</span>
  </div>

  <ul class="nav-links">
    <li><a href="/Home_index.html" style="text-decoration: none; color: inherit;">Home</a></li>
    <li><a href="/Bikes.html" style="text-decoration: none; color: inherit;">Bikes</a></li>
    <li><a href="/Car.html" style="text-decoration: none; color: inherit;">Cars</a></li>
    <li><a href="/MyBooking.html" style="text-decoration: none; color: inherit;">My Bookings</a></li>
  </ul>

  <div class="nav-actions">
    <button class="btn-outline" onclick="window.location.href='/admin-login/'">Admin</button>
    <button class="btn-primary" onclick="window.location.href='/login.html'">Login</button>
  </div>
</nav>

<main class="login-shell">
  <div class="auth-container">
    <h2>Customer Login</h2>

    <form id="loginForm" onsubmit="event.preventDefault(); login();">
      <input type="text" id="loginEmail" placeholder="Email / LPU ID" required>
      <input type="password" id="loginPassword" placeholder="Password" required>

      <button type="submit">Login</button>
    </form>

    <p class="switch">
      New user? <a href="signup.html">Create an account</a>
    </p>
    <p class="auth-meta"><a href="/forgot-password.html">Forgot Password?</a></p>
  </div>
</main>
<script src="{% static 'js/auth.js' %}?v=20260307a"></script>
<script src="{% static 'js/navbar.js' %}"></script>
</body>
</html>
